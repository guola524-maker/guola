<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
html,body{
    height:100%;
    overflow:hidden;
    font-family:system-ui,"Microsoft Yahei",sans-serif;
    color:#94C0F7;
}

#snowCanvas{
    position:fixed;
    inset:0;
    z-index:-2;
}

.scroll-wrap{
    width:100%;
    height:100vh;
    overflow-y:auto;
    padding:20px;
    padding-top:32px;
    padding-bottom:50px;
    position:relative;
    z-index:1;
}

.splash-screen {
    position:fixed;
    inset:0;
    background:#ffffff;
    z-index:999999;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    transition:opacity 0.6s ease-out;
}
.splash-screen.fade-out {
    opacity:0;
    pointer-events:none;
}
.app-icon {
    width:80px;
    height:80px;
    border-radius:18px;
    box-shadow:0 6px 16px rgba(148,192,247,0.35);
    object-fit:cover;
}
.splash-text {
    color:#94C0F7;
    font-size:20px;
    margin-top:24px;
    font-weight:bold;
}

.snow-float-wrap{
    position:fixed;
    z-index:999;
    bottom:100px;
    left:20px;
    user-select:none;
    -webkit-user-drag:none;
    touch-action:none;
}
.snow-icon-btn{
    width:50px;
    height:50px;
    border-radius:50%;
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(148,192,247,0.4);
    color:#94C0F7;
    font-size:22px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.snow-float-panel{
    width:160px;
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(148,192,247,0.4);
    border-radius:16px;
    padding:12px;
    margin-top:10px;
    display:none;
}

.snow-float-panel.show{
    display:block;
}

.float-title{
    color:#94C0F7;
    text-align:center;
    font-size:14px;
    padding-bottom:8px;
    border-bottom:1px solid rgba(148,192,247,0.3);
    margin-bottom:10px;
    cursor:move;
}

.float-btn{
    width:100%;
    padding:8px;
    margin:4px 0;
    border-radius:8px;
    border:none;
    background:rgba(148,192,247,0.18);
    color:#94C0F7;
    font-size:13px;
    cursor:pointer;
}

.float-btn:hover{
    background:rgba(148,192,247,0.3);
}


.title-main{
    font-size:32px;
    text-align:center;
    color:#fff;
    text-shadow:0 0 16px #c6e7ff,0 0 30px #86c6ff;
    margin-bottom:16px;
    letter-spacing:2px;
}


.num-box{
    padding:26px 22px;
    border-radius:16px;
    margin-bottom:25px;
    background:rgba(148,192,247,0.08);
    backdrop-filter:blur(6px);
    border:1px solid rgba(148,192,247,0.25);
}
.data-num{
    font-size:26px;
    color:#94C0F7;
    font-weight:bold;
    text-align:center;
}


.tip{
    font-size:15px;
    margin:15px 0;
    text-align:center;
    color:#94C0F7;
}


.progress{
    background:rgba(148,192,247,0.12);
    border-radius:8px;
    height:24px;
    width:100%;
    margin:10px 0;
    overflow:hidden;
}
.bar{
    height:100%;
    background:#94C0F7;
    transition:0.3s;
    width:0%;
    border-radius:8px;
}


.btn-full{
    width:100%;
    padding:18px;
    margin-bottom:14px;
    border:none;
    border-radius:12px;
    background:rgba(148,192,247,0.22);
    backdrop-filter:blur(6px);

    font-weight:bold;

}
.btn-full:hover{

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';


const splash = document.getElementById('splash');
if(sessionStorage.getItem('hasShowSplash')){
    splash.style.display = 'none';
}else{
    sessionStorage.setItem('hasShowSplash', '1');
    setTimeout(() => {
        splash.classList.add('fade-out');
        setTimeout(() => {
            splash.style.display = 'none';
        }, 600);
    }, 800);
}


const floatWrap = document.getElementById('floatWrap');
const iconBtn = document.getElementById('iconBtn');
const floatPanel = document.getElementById('floatPanel');
const dragBar = document.getElementById('dragBar');

let panelOpen = false;
iconBtn.addEventListener('click', ()=>{
    panelOpen = !panelOpen;
    floatPanel.classList.toggle('show', panelOpen);
});

let dragStartX, dragStartY;
let wrapStartX, wrapStartY;
let isDrag = false;

function onDragStart(e){
    e.preventDefault();
    e.stopPropagation();
    isDrag = true;
    const touch = e.touches ? e.touches[0] : e;
    dragStartX = touch.clientX;
    dragStartY = touch.clientY;
    const rect = floatWrap.getBoundingClientRect();
    wrapStartX = rect.left;
    wrapStartY = rect.top;
    floatWrap.style.transition = 'none';
}

function onDragMove(e){
    if(!isDrag) return;
    e.preventDefault();
    const touch = e.touches ? e.touches[0] : e;
    const dx = touch.clientX - dragStartX;
    const dy = touch.clientY - dragStartY;
    floatWrap.style.left = (wrapStartX + dx) + 'px';
    floatWrap.style.top = (wrapStartY + dy) + 'px';
}

function onDragEnd(){
    isDrag = false;
    floatWrap.style.transition = '0.1s ease';
}

dragBar.addEventListener('touchstart', onDragStart);
document.addEventListener('touchmove', onDragMove);
document.addEventListener('touchend', onDragEnd);
dragBar.addEventListener('mousedown', onDragStart);
document.addEventListener('mousemove', onDragMove);
document.addEventListener('mouseup', onDragEnd);

// Three.js 
const container = document.getElementById('snowCanvas');
const renderer = new THREE.WebGLRenderer({
    antialias: true,
    alpha: true,
    powerPreference: "default"
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050818);
scene.fog = new THREE.FogExp2(0x070b20, 0.006);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 400);
camera.position.set(0, 12, 90);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 25;
controls.maxDistance = 160;
controls.maxPolarAngle = Math.PI / 2 - 0.03;
controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };

const ambientLight = new THREE.AmbientLight(0xc6e0ff, 0.45);
scene.add(ambientLight);
const moonLight = new THREE.DirectionalLight(0xe8f2ff, 0.75);
moonLight.position.set(-30, 60, 20);
scene.add(moonLight);

const groundGeo = new THREE.PlaneGeometry(300, 300);
groundGeo.rotateX(-Math.PI / 2);
const groundMat = new THREE.MeshStandardMaterial({
    color: 0xeef6ff,
    roughness: 0.92,
    metalness: 0,
    transparent: true,
    opacity: 0.75
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.position.y = -45;
scene.add(ground);

const starCount = 600;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
for(let i=0;i<starCount;i++){
    starPos[i*3] = (Math.random()-0.5)*300;
    starPos[i*3+1] = Math.random()*140 + 20;
    starPos[i*3+2] = (Math.random()-0.5)*300;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({color:0xffffff, size:0.6, transparent:true, opacity:0.7, sizeAttenuation:true, depthWrite:false});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

let snowSwitch = true;
let snowHeavy = 1600;
let snowNear = 450;
let windPower = 0.3;
let farSnow, snowMeshArr = [];

function initFarSnow(){
    const farGeo = new THREE.BufferGeometry();
    const farPos = new Float32Array(snowHeavy * 3);
    const farWind = new Float32Array(snowHeavy);
    const farSize = new Float32Array(snowHeavy);
    for(let i=0;i<snowHeavy;i++){
        const idx = i*3;
        farPos[idx] = (Math.random()-0.5)*160;
        farPos[idx+1] = Math.random()*110 - 40;
        farPos[idx+2] = (Math.random()-0.5)*160;
        farWind[i] = Math.random()*9999;
        farSize[i] = Math.random()*0.4 + 0.15;
    }
    farGeo.setAttribute('position', new THREE.BufferAttribute(farPos,3));
    farGeo.setAttribute('windSeed', new THREE.BufferAttribute(farWind,1));
    farGeo.setAttribute('size', new THREE.BufferAttribute(farSize,1));
    const farMat = new THREE.PointsMaterial({
        color:0xffffff, size:1.1, transparent:true, opacity:0.55, sizeAttenuation:true, depthWrite:false
    });
    farSnow = new THREE.Points(farGeo, farMat);
    scene.add(farSnow);
}

function createNearSnow(){
    snowMeshArr.forEach(m=>scene.remove(m));
    snowMeshArr.length = 0;
    const snowGeo6 = new THREE.CircleGeometry(0.7, 6);
    const snowMat6 = new THREE.MeshBasicMaterial({
        color:0xffffff, transparent:true, opacity:0.82, side:THREE.DoubleSide
    });
    for(let i=0;i<snowNear;i++){
        const mesh = new THREE.Mesh(snowGeo6, snowMat6.clone());
        mesh.position.set(
            (Math.random()-0.5)*100,
            Math.random()*90 - 20,
            (Math.random()-0.5)*100
        );
        mesh.userData = {
            speed: Math.random()*0.06 + 0.03,
            rotSpd: (Math.random()-0.5)*0.03,
            windSeed: Math.random()*9999,
            drift: Math.random()*0.4
        };
        snowMeshArr.push(mesh);
        scene.add(mesh);
    }
}

initFarSnow();
createNearSnow();

const clock = new THREE.Clock();
function renderLoop(){
    requestAnimationFrame(renderLoop);
    const time = clock.getElapsedTime();
    controls.update();

    if(snowSwitch){
        const farPosAttr = farSnow.geometry.attributes.position;
        const farArr = farPosAttr.array;
        for(let i=0;i<snowHeavy;i++){
            const i3 = i*3;
            const seed = farSnow.geometry.attributes.windSeed.array[i];
            farArr[i3+1] -= windPower * 0.12;
            const wave1 = Math.sin(time * 0.7 + seed) * windPower * 0.12;
            const wave2 = Math.cos(time * 1.1 + seed * 0.5) * windPower * 0.06;
            farArr[i3] += wave1 + wave2;
            farArr[i3+2] += Math.sin(time * 0.4 + seed * 0.7) * windPower * 0.04;
            if(farArr[i3+1] < -48){
                farArr[i3+1] = 100;
                farArr[i3] = (Math.random()-0.5)*160;
                farArr[i3+2] = (Math.random()-0.5)*160;
            }
        }
        farPosAttr.needsUpdate = true;
        farSnow.visible = true;

        snowMeshArr.forEach(mesh=>{
            mesh.visible = true;
            const ud = mesh.userData;
            mesh.position.y -= ud.speed * windPower;
            const w1 = Math.sin(time * 0.9 + ud.windSeed) * ud.drift * windPower;
            const w2 = Math.cos(time * 1.3 + ud.windSeed * 0.6) * ud.drift * windPower * 0.5;
            mesh.position.x += w1;
            mesh.position.z += w2;
            mesh.rotation.z += ud.rotSpd;
            if(mesh.position.y < -48){
                mesh.position.y = 95;
                mesh.position.x = (Math.random()-0.5)*100;
                mesh.position.z = (Math.random()-0.5)*100;
            }
        });
    }else{
        farSnow.visible = false;
        snowMeshArr.forEach(m=>m.visible=false);
    }

    renderer.render(scene, camera);
}
renderLoop();

window.addEventListener('resize',()=>{
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});


document.getElementById('windMin').onclick = ()=> windPower = 0.12;
document.getElementById('windMax').onclick = ()=> windPower = 0.9;
document.getElementById('snowLess').onclick = ()=>{
    snowHeavy = 800;
    snowNear = 200;
    scene.remove(farSnow);
    initFarSnow();
    createNearSnow();
};
document.getElementById('snowMore').onclick = ()=>{
    snowHeavy = 2200;
    snowNear = 600;
    scene.remove(farSnow);
    initFarSnow();
    createNearSnow();
};
document.getElementById('snowSwitch').onclick = function(){
    snowSwitch = !snowSwitch;
    this.innerText = snowSwitch ? "关闭雪景" : "开启雪景";
};
document.getElementById('resetSnow').onclick = ()=>{
    windPower = 0.3;
    snowSwitch = true;
    camera.position.set(0,12,90);
    controls.reset();
    scene.remove(farSnow);
    initFarSnow();
    createNearSnow();
};

let need = 10;

function getRandomNum(){
  let s = "";
  for(let i=0;i<8;i++){
    s += Math.floor(Math.random()*10);
  }
  return s;
}

function updateUI(){
